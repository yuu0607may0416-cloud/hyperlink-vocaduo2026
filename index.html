<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サイトのタイトル</title>
    <style>
        /* 文字だけのサイトを美しく見せるための最低限のデザイン */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.8;
            color: #333333;
            max-width: 650px; /* 1行が長くなりすぎない、読みやすい横幅 */
            margin: 40px auto; /* 画面の中央に配置 */
            padding: 0 20px;
            background-color: #fcfcfc; /* 目に優しいほんのり明るい背景 */
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }

        h2 {
            font-size: 18px;
            margin-top: 40px;
        }

        p {
            margin-bottom: 20px;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 60px;
            font-size: 12px;
            color: #777;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <h1>私のテキストサイト</h1>
    
    <p>ハイパーリンク</p>

    <footer>
        &copy; 2026 Discordを乗っ取られて関係各所を怖がらせましょう！
    </footer>

</body>
</html>
